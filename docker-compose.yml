services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/student_alumni?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - LINKEDIN_SCRAPER_URL=http://python-scraper:8000
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
      python-scraper:
        condition: service_healthy
    restart: always

  python-scraper:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LINKEDIN_EMAIL=${LINKEDIN_EMAIL}
      - LINKEDIN_PASSWORD=${LINKEDIN_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=student_alumni
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d student_alumni" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  db-setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/student_alumni?schema=public
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma db push && npx prisma db seed"

volumes:
  postgres_data:
